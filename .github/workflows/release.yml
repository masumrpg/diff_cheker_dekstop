name: Auto Release on Version Bump

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  check-version:
    name: Check for version change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          NEW_VERSION=$(jq -r .version package.json)
          OLD_VERSION=$(git show HEAD^:package.json | jq -r .version || echo "0.0.0")
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "Version bumped from $OLD_VERSION to $NEW_VERSION"
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version not changed ($NEW_VERSION)"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.os }})
    needs: check-version
    if: needs: check-version.outputs.version_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libfuse2

      - name: Install dependencies
        run: bun install

      - name: Build Application
        run: bun run build:prod

      - name: Package Linux
        if: matrix.platform == 'linux'
        run: |
          cd build/prod-linux-x64
          tar -czvf ../../diff-checker-linux.tar.gz .
        shell: bash

      - name: Package Windows
        if: matrix.platform == 'win'
        run: |
          cd build/prod-win-x64
          Compress-Archive -Path * -DestinationPath ../../diff-checker-windows.zip
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            diff-checker-linux.tar.gz
            diff-checker-windows.zip
          if-no-files-found: ignore

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [check-version, build]
    if: needs.check-version.outputs.version_changed == 'true'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ needs.check-version.outputs.new_version }}"
          name: "Release v${{ needs.check-version.outputs.new_version }}"
          files: |
            artifacts/diff-checker-linux.tar.gz
            artifacts/diff-checker-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
